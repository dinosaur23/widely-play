<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="All Shows - Widely TV">
  <title>All Shows - Widely TV</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header Section -->
  <header class="show-header">
    <div class="banner">
      <img src="shows-banner.jpg" alt="All Shows" class="banner-image">
      <div class="show-info-overlay">
        <h1>All Shows</h1>
        <p>Explore all of your favorite Widely TV shows.</p>
      </div>
    </div>
  </header>

  <!-- All Shows Section -->
  <main class="all-shows-content">
    <section class="showcase">
      <h2>Browse Shows</h2>
      <div class="show-grid">
        <!-- Example Show Cards -->
        <div class="show-card">
          <img src="goodnight show 2024.png" alt="Show 1">
          <h3>Goodnight show 2024</h3>
        </div>
        <div class="show-card">
          <img src="Good Morning SHOW.png" alt="Show 2">
          <h3>Good morning show</h3>
        </div>
        <div class="show-card">
          <img src="4 X site poster.png" alt="Show 3">
          <h3>4X</h3>
        </div>
        <div class="show-card">
          <img src="show4.jpg" alt="Show 4">
          <h3>Show Title 4</h3>
        </div>
        <div class="show-card">
          <img src="show5.jpg" alt="Show 5">
          <h3>Show Title 5</h3>
        </div>
        <!-- Add more rows of shows -->
        <div class="show-card">
          <img src="show6.jpg" alt="Show 6">
          <h3>Show Title 6</h3>
        </div>
        <div class="show-card">
          <img src="show7.jpg" alt="Show 7">
          <h3>Show Title 7</h3>
        </div>
        <div class="show-card">
          <img src="show8.jpg" alt="Show 8">
          <h3>Show Title 8</h3>
        </div>
        <div class="show-card">
          <img src="show9.jpg" alt="Show 9">
          <h3>Show Title 9</h3>
        </div>
        <div class="show-card">
          <img src="show10.jpg" alt="Show 10">
          <h3>Show Title 10</h3>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer Section -->
  <footer class="footer">
    <p>&copy; 2025 Widely TV Networks | All rights reserved.</p>
  </footer>
</body>
</html>
