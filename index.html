<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your TV Network">
  <title>Your TV Network</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header Section with Featured Show -->
  <header class="header">
    <div class="featured-show">
      <img src="Copy of Untitled Design.png" alt="Featured Show" class="featured-image">
      <div class="show-info">
        <h1>Welcome to widely play</h1>
        <p>A brief description of the featured show, its plot, or key details.</p>
        <button class="watch-now-btn">Watch Now</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <section class="showcase">
      <h2>All Shows</h2>
      <div class="show-list">
        <!-- You can add more show sections like this -->
        <div class="show-card">
          <img src="show1.jpg" alt="Show Title">
          <h3>4X on Widely TV & Widely extra</h3>
        </div>
        <div class="show-card">
          <img src="show2.jpg" alt="Show Title">
          <h3>The goodnight show 2024</h3>
        </div>
        <!-- Add more shows here -->
        <div class="show-card">
          <img src="show2.jpg" alt="Show Title">
          <h3>The good morning show</h3>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer Section -->
  <footer class="footer">
    <p>&copy; 2025 Widely TV networks australia | All rights reserved.</p>
  </footer>

</body>
</html>
